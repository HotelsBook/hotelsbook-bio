<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelsBook | Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #050465 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
        }

        .profile {
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .profile h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .profile p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 16px;
            font-weight: 400;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: block;
            padding: 16px 24px;
            background: #ffffff;
            color: #2d3748;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary {
            background: #48bb78;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #38a169;
        }

        .btn-secondary {
            background: #4299e1;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background: #3182ce;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.95);
            color: #2d3748;
        }

        .social-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .social-links a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }

        @media (max-width: 640px) {
            body {
                padding: 30px 15px;
            }

            .logo {
                width: 100px;
                height: 100px;
            }

            .profile h1 {
                font-size: 24px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <!-- Substitua pelo URL da sua logo -->
            <img src="logo-hotelsbook.png" alt="HotelsBook" class="logo">
            <h1>HotelsBook</h1>
            <p>Consultoria e Tecnologia para Hotelaria</p>
        </div>

        <div class="links">
            <!-- CTA Principal - WhatsApp -->
            <a href="https://wa.me/55SEUNUMERO" class="btn btn-primary" target="_blank">
                Falar com Consultor
            </a>

            <!-- Produtos -->
            <a href="https://databeds.hotelsbook.com.br" class="btn btn-secondary" target="_blank">
                DataBeds - Revenue Management
            </a>

            <a href="https://hospped.hotelsbook.com.br" class="btn btn-secondary" target="_blank">
                Hospped - Viagens Corporativas
            </a>

            <!-- Site Institucional -->
            <a href="https://hotelsbook.com.br" class="btn btn-outline" target="_blank">
                Conheça Nossas Soluções
            </a>

            <!-- Sobre -->
            <a href="https://hotelsbook.com.br/sobre" class="btn btn-outline" target="_blank">
                Sobre a HotelsBook

    </div>
</body>
</html>
